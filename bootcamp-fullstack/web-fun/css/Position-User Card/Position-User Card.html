<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>User Card</title>
        <link rel="stylesheet"
            href="/web fun/css/Position-User Card/Position-User Card.css">
        <link rel="stylesheet"
            href="/css/usercard/card.css">
    </head>
    <body>
        <div class="page">
            <div class="card">
                <div class="card-header"></div>
                <div class="avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="card-body">
                    <h1>Jane Doe</h1>
                    <p class="location">
                        <i class="fa-solid fa-location-dot"></i>
                        Seattle
                    </p>
                    <p class="bio">
                        Developer | Engineer | Problem Solver <br>
                        Master of shadows and the Internet!
                    </p>
                    <a class="edit" href="#">
                        <i class="fa-solid fa-gear"></i>
                        edit profile
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
