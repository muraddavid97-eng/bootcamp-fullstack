<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Likes</title>
        <link rel="stylesheet" href="/js/likes/like.css">
    </head>

    <body>

        <div class="header">
            <h1>Network</h1>
        </div>

        <h2 class="feed-title">Your Feed</h2>

        <div class="container">

            <!-- LEFT USER CARD -->
            <div class="user-card">
                <div class="avatar"><img src="/js/likes/avatarlike.png"
                        alt="avatar"></div>
                <a href="#">Add an avatar</a>
                <h3>James Doe</h3>
            </div>

            <!-- POSTS -->
            <div class="posts">

                <!-- POST 1 -->
                <div class="post">
                    <div class="post-top">
                        <h3>Neil M</h3>
                        <p><span class="like-count">9</span> like(s)</p>
                        <button onclick="addLike(this)">Like</button>
                    </div>

                    <p>
                        I just set up this new discord bot, let me know what you
                        all think.
                        <a href="#">link</a>
                    </p>
                </div>

                <!-- POST 2 -->
                <div class="post">
                    <div class="post-top">
                        <h3>Nichole K</h3>
                        <p><span class="like-count">12</span> like(s)</p>
                        <button onclick="addLike(this)">Like</button>
                    </div>

                    <p>
                        Just finished my <a href="#">next comic</a>, check it
                        out.
                    </p>
                </div>

                <!-- POST 3 -->
                <div class="post">
                    <div class="post-top">
                        <h3>Jim R</h3>
                        <p><span class="like-count">9</span> like(s)</p>
                        <button onclick="addLike(this)">Like</button>
                    </div>

                    <p>
                        I can't stop listening to the <a href="#">new album</a>.
                        Who else is liking it?
                    </p>
                </div>

            </div>

        </div>

        <script src="/js/likes/like.js"></script>

    </body>
</html>
